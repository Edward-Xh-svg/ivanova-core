<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحاسبة والرياضيات المالية | BacMaroc</title>
    <link rel="icon" href="bacmaroc-faivcon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <style>
        :root {
            --bg-dark: #080808;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #3f51b5;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(8, 8, 8, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000; }
        .back-to-branch { color: var(--text-dim); text-decoration: none; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-to-branch:hover { color: #fff; transform: translateX(5px); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .page-title { text-align: center; margin-bottom: 50px; }
        .page-title h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to left, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .exams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .exam-card { 
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; 
            text-align: center; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .exam-card:hover { transform: translateY(-10px); border-color: var(--accent); background: rgba(255,255,255,0.06); box-shadow: 0 15px 30px rgba(63, 81, 181, 0.2); }
        .exam-card i { font-size: 2.5rem; color: #e74c3c; margin-bottom: 15px; }
        .exam-card .year { font-size: 1.6rem; font-weight: 800; display: block; margin-bottom: 5px; }
        .exam-card .label { font-size: 0.85rem; color: var(--text-dim); font-weight: 600; }

        #viewerContainer { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; animation: fadeIn 0.3s ease; }
        .viewer-header { background: #111; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .pdf-btn { background: #222; border: 1px solid #444; color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-family: 'Cairo'; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .pdf-btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
        .pdf-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .pdf-frame-wrapper { flex-grow: 1; overflow-y: auto; background: #0c0c0c; display: flex; justify-content: center; padding: 20px; }
        canvas { max-width: 100%; height: auto !important; box-shadow: 0 0 50px rgba(0,0,0,0.7); border-radius: 4px; user-select: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loader { width: 40px; height: 40px; border: 3px solid var(--glass-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="seco.html" class="back-to-branch" id="navBack"><i class="fa-solid fa-arrow-right"></i> العودة للشعبة</a>
        <img src="grosmen-fivcon.png" style="height: 50px;">
    </header>

    <div class="container" id="gridWrapper">
        <div class="page-title">
            <h1>المحاسبة والرياضيات المالية</h1>
            <p style="color: var(--text-dim)">تصفح حصري داخل منصة BacMaroc</p>
        </div>

        <div id="statusMessage" style="text-align: center;">
            <div class="loader"></div>
            <p style="color: var(--accent)">جاري استحضار الأرشيف الرقمي وتحسين جودة النص...</p>
        </div>

        <div class="exams-grid" id="examsGrid"></div>
    </div>

    <div id="viewerContainer">
        <div class="viewer-header">
            <button class="pdf-btn" onclick="closeViewer()"><i class="fa-solid fa-chevron-right"></i> إنهاء القراءة</button>
            <div style="display:flex; gap:15px; align-items:center;">
                <button class="pdf-btn" id="prevPage"><i class="fa-solid fa-chevron-right"></i></button>
                <span style="font-weight:700">صفحة <span id="pageNum">1</span> من <span id="pageCount">-</span></span>
                <button class="pdf-btn" id="nextPage"><i class="fa-solid fa-chevron-left"></i></button>
            </div>
            <div style="width: 100px;"></div> 
        </div>
        <div class="pdf-frame-wrapper">
            <canvas id="pdfCanvas" oncontextmenu="return false;"></canvas>
        </div>
    </div>

    <script>
        const config = {
            prefix: 'secoexcmc-',
            path: 'ex/', 
            years: [2025, 2024, 2023, 2022, 2021, 2020, 2019, 2018, 2017, 2016]
        };

        async function init() {
            const grid = document.getElementById('examsGrid');
            const status = document.getElementById('statusMessage');
            for (const year of config.years) {
                const fileUrl = `${config.path}${config.prefix}${year}.pdf`;
                try {
                    const res = await fetch(fileUrl, { method: 'HEAD' });
                    if (res.ok) createCard(year, fileUrl);
                } catch (e) { }
            }
            status.style.display = 'none';
            const urlYear = new URLSearchParams(window.location.search).get('exams');
            if (urlYear) openExam(urlYear, `${config.path}${config.prefix}${urlYear}.pdf`);
        }

        function createCard(year, url) {
            const card = document.createElement('div');
            card.className = 'exam-card';
            card.onclick = () => openExam(year, url);
            card.innerHTML = `<i class="fa-solid fa-file-pdf"></i><span class="year">${year}</span><span class="label">عرض الامتحان</span>`;
            document.getElementById('examsGrid').appendChild(card);
        }

        let pdfDoc = null, pNum = 1, canvas = document.getElementById('pdfCanvas'), ctx = canvas.getContext('2d');

        // الإصلاح الجوهري هنا: إضافة معايير معالجة الأحرف العربية
        function openExam(year, url) {
            window.history.pushState(null, '', `?exams=${year}`);
            document.getElementById('viewerContainer').style.display = 'flex';
            document.getElementById('navBack').style.visibility = 'hidden';
            document.body.style.overflow = 'hidden';
            
            const loadingTask = pdfjsLib.getDocument({
                url: url,
                // روابط الـ CMaps ضرورية جداً للخطوط العربية
                cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/',
                cMapPacked: true,
                standardFontDataUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/standard_fonts/'
            });

            loadingTask.promise.then(pdf => {
                pdfDoc = pdf;
                document.getElementById('pageCount').textContent = pdf.numPages;
                renderPage(1);
            }).catch(err => {
                alert("تعذر معالجة نصوص الملف. قد يكون الملف تالفاً أو غير موجود.");
                closeViewer();
            });
        }

        function renderPage(num) {
            pNum = num;
            pdfDoc.getPage(num).then(page => {
                // رفع الـ Scale إلى 2.0 لتحسين وضوح الحروف الصغيرة في المحاسبة
                const viewport = page.getViewport({scale: 2.0});
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport,
                    // تفعيل تحسينات النص داخل الكانفاس
                    enableWebGL: true 
                };

                page.render(renderContext).promise.then(() => {
                    document.getElementById('pageNum').textContent = num;
                    document.getElementById('prevPage').disabled = (num <= 1);
                    document.getElementById('nextPage').disabled = (num >= pdfDoc.numPages);
                });
            });
        }

        function closeViewer() {
            window.history.pushState(null, '', window.location.pathname);
            document.getElementById('viewerContainer').style.display = 'none';
            document.getElementById('navBack').style.visibility = 'visible';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('nextPage').onclick = () => { if(pNum < pdfDoc.numPages) renderPage(++pNum); };
        document.getElementById('prevPage').onclick = () => { if(pNum > 1) renderPage(--pNum); };
        window.onpopstate = () => { if (!window.location.search.includes('exams')) closeViewer(); };
        window.onload = init;
    </script>
</body>
</html>
