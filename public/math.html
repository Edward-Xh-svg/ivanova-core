    <style>
        #reader-view { display: none; width: 100%; }
        
        /* حاوية عرض صفحات الـ PDF */
        #pdf-render-container {
            width: 100%;
            height: 75vh;
            overflow-y: auto;
            background: #111;

            border-radius: 10px;
            padding: 10px;

        }

        canvas {

            margin: 0 auto 15px auto;

            border-radius: 4px;

        .back-btn {
            background: #222;
            color: var(--accent-color);

            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
            border: 1px solid #333;
        }

        .loading-overlay {
            color: var(--accent-color);
            text-align: center;
            padding: 20px;
        }

        /* مساحة للإعلانات */
        .ad-spot {
            width: 100%;
            height: 90px;
            background: rgba(255,255,255,0.05);
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #444;
            color: #666;
        }
    </style>

<script>(function(s){s.dataset.zone='10908815',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

</head>
<body>

    <div class="container" id="main-container">
        <div id="grid-view">
            <h1>إمتحانات الرياضيات (2010 - 2025)</h1>
            <p style="margin-bottom: 30px; opacity: 0.7;">اختر السنة لبدء المحاكاة</p>
            <div id="pdf-list" class="grid"></div>
        </div>

        <div id="reader-view">
            <div class="back-btn" onclick="closeReader()">
                <i class="fa-solid fa-arrow-right"></i> العودة للقائمة
            </div>
            
            <h2 id="current-exam-title" style="margin-bottom: 10px; font-size: 1.2rem;"></h2>

            <div class="ad-spot">مساحة إعلانية علوية</div>

            <div id="pdf-render-container">
                </div>

            <div class="ad-spot">مساحة إعلانية سفلية</div>

            <div style="margin-top: 30px; padding-bottom: 50px;">
                <a href="bacmode-MT.html" class="card" style="border: 2px solid var(--accent-color); padding: 15px; max-width: 300px; margin: 0 auto;">
                    <i class="fa-solid fa-bolt"></i>
                    <span>BAC MODE MATH</span>
                </a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Ivanova Core - منظومة الامتحانات الوطنية</p>
    </footer>

    <script>
        // إعدادات PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const gridView = document.getElementById('grid-view');
        const readerView = document.getElementById('reader-view');
        const pdfList = document.getElementById('pdf-list');
        const container = document.getElementById('pdf-render-container');
        const currentTitle = document.getElementById('current-exam-title');

        // توليد الـ 15 ملف
        for (let year = 2010; year <= 2025; year++) {
            const fileName = `Examen national de mathématiques ${year} - SPCF`;
            const fullPath = `mathPDF/${fileName}.pdf`;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <i class="fa-solid fa-file-pdf" style="color: #ff4444;"></i>
                <span>${year} - الرياضيات</span>
            `;

            card.onclick = () => openReader(fullPath, fileName);
            pdfList.appendChild(card);
        }

        async function openReader(url, title) {
            gridView.style.display = 'none';
            readerView.style.display = 'block';
            currentTitle.innerText = title;
            container.innerHTML = '<div class="loading-overlay">جاري تشغيل المفاعل واستخراج البيانات...</div>';

            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                container.innerHTML = ''; // إزالة رسالة التحميل

                // رسم جميع الصفحات داخل الحاوية
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    
                    await page.render(renderContext).promise;
                    container.appendChild(canvas);
                }
            } catch (error) {
                container.innerHTML = '<div style="color:red;">عذراً، تعذر تحميل الملف. تأكد من وجوده في مجلد mathPDF بنفس الاسم بدقة.</div>';
                console.error(error);
            }
            window.scrollTo(0, 0);
        }

        function closeReader() {
            readerView.style.display = 'none';
            gridView.style.display = 'block';
            container.innerHTML = ''; 
        }
    </script>
