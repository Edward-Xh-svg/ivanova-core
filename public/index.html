<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVANOVA | SOVEREIGN CORE OS</title>
    <link rel="stylesheet" href="os-core.css"> 
    <link rel="icon" href="ivanova-favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body onclick="launchSovereignOS()"> <div class="matrix-bg"></div>
    <div class="overlay-gradient"></div>

    <nav class="status-bar">
        <div class="system-id">
            <span class="core-status">CORE ACTIVE</span>
            <span class="brand">IVANOVA <span class="os-version">v1.9.8</span></span>
        </div>
        <div class="time-module" id="clock">00:00:00</div>
        <div class="controls">
            <i class="fas fa-signal-perfect"></i>
            <i class="fas fa-microchip"></i>
            <span class="security-level">LEVEL 5</span>
        </div>
    </nav>

    <main class="desktop-area">
        <div class="icon-grid">
            
            <div class="app-icon" onclick="window.location.href='/grosmen.html'">
                <div class="icon-wrapper neon-red">
                    <i class="fas fa-satellite-dish"></i>
                </div>
                <span class="app-name">Grosmen</span>
            </div>

            <div class="app-icon" onclick="window.location.href='/blackwons.html'">
                <div class="icon-wrapper neon-red">
                    <i class="fas fa-user-secret"></i>
                </div>
                <span class="app-name">Blackwons</span>
            </div>

            <div class="app-icon" onclick="window.location.href='/bacmaroc.html'">
                <div class="icon-wrapper neon-red">
                    <i class="fas fa-landmark-dome"></i>
                </div>
                <span class="app-name">BacMaroc</span>
            </div>

        </div>
    </main>

    <footer class="taskbar neon-border">
        <div class="start-btn-wrapper">
            <div class="start-btn neon-red"></div>
        </div>
        <div class="active-apps">
            <div class="app-dot active neon-red"></div>
            <div class="app-dot neon-red"></div>
        </div>
    </footer >

    <script>
        // دالة ملء الشاشة التلقائية عند التفاعل
        function launchSovereignOS() {
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.mozRequestFullScreen) doc.mozRequestFullScreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            else if (doc.msRequestFullscreen) doc.msRequestFullscreen();
            
            // إزالة الحدث بعد أول تفعيل لعدم الإزعاج
            document.body.removeAttribute('onclick');
        }

        // تحديث الساعة الحقيقية
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
