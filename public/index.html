<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVANOVA | SOVEREIGN CORE</title>
    <link rel="icon" href="ivanova-favicon.png" type="image/png">
    <link rel="stylesheet" href="os-core.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body onclick="launchSovereignOS()"> 
    <div class="background-overlay"></div>

    <main class="desktop-area">
        <div class="icon-grid">
            
            <div class="app-icon" onclick="window.location.href='/grosmen.html'">
                <div class="icon-wrapper glass-effect">
                    <i class="fas fa-satellite-dish"></i>
                </div>
                <span class="app-name">Grosmen</span>
            </div>

            <div class="app-icon" onclick="window.location.href='/blackwons.html'">
                <div class="icon-wrapper glass-effect">
                    <i class="fas fa-box-archive"></i>
                </div>
                <span class="app-name">Blackwons</span>
            </div>

            <div class="app-icon" onclick="window.location.href='/bacmaroc.html'">
                <div class="icon-wrapper glass-effect">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <span class="app-name">BacMaroc</span>
            </div>

        </div>
    </main>

    <footer class="taskbar glass-effect">
        <div class="start-btn-wrapper">
            <img src="ivanova-favicon.png" alt="Ivanova Start" class="start-icon">
        </div>
        <div class="active-indicator">
            <div class="dot active"></div>
        </div>
    </footer>

    <script>
        function launchSovereignOS() {
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.mozRequestFullScreen) doc.mozRequestFullScreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            else if (doc.msRequestFullscreen) doc.msRequestFullscreen();
            document.body.removeAttribute('onclick');
        }
    </script>
</body>
</html>
