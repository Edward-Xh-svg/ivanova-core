<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اللغة الإنجليزية | SM - BacMaroc</title>
    <link rel="icon" href="bacmaroc-faivcon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.07);
            --accent: #ff2e63; /* لون وردي إنجليزي حيوي */
            --text-main: #ffffff;
            --text-dim: #707070;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        .main-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 40px; background: rgba(5, 5, 5, 0.9); 
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .back-to-branch { color: var(--text-dim); text-decoration: none; font-size: 1rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-to-branch:hover { color: #fff; }

        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .page-title { text-align: center; margin-bottom: 60px; }
        .page-title h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; }
        .page-title p { color: var(--text-dim); margin-top: 10px; font-size: 1.1rem; }

        .exams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .exam-card { 
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; padding: 35px 20px; 
            text-align: center; cursor: pointer; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .exam-card:hover { transform: translateY(-8px); border-color: var(--accent); background: rgba(255, 46, 99, 0.05); }
        .exam-card i { font-size: 2rem; color: var(--accent); margin-bottom: 15px; display: block; opacity: 0.8; }
        .exam-card .year { font-size: 1.5rem; font-weight: 800; display: block; margin-bottom: 5px; }
        .exam-card .label { font-size: 0.75rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }

        #viewerContainer { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        .viewer-header { background: #0a0a0a; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .pdf-btn { background: #151515; border: 1px solid #222; color: #fff; padding: 10px 22px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
        .pdf-btn:hover { background: var(--accent); color: #fff; }
        
        .pdf-frame-wrapper { flex-grow: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .loader { width: 30px; height: 30px; border: 2px solid var(--glass-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="smath.html" class="back-to-branch" id="navBack"><i class="fa-solid fa-chevron-right"></i> شعبة العلوم الرياضية</a>
        <img src="grosmen-fivcon.png" style="height: 45px; opacity: 0.5;">
    </header>

    <div class="container" id="gridWrapper">
        <div class="page-title">
            <h1>اللغة الإنجليزية</h1>
            <p>امتحانات البكالوريا الموحدة - جميع المسالك العلمية والرياضية</p>
        </div>

        <div id="statusMessage" style="text-align: center;">
            <div class="loader"></div>
            <p style="color: var(--text-dim); font-size: 0.9rem;">جاري جلب ملفات الإنجليزية...</p>
        </div>

        <div class="exams-grid" id="examsGrid"></div>
    </div>

    <div id="viewerContainer">
        <div class="viewer-header">
            <button class="pdf-btn" onclick="closeViewer()"><i class="fa-solid fa-xmark"></i> إغلاق</button>
            <span id="currentDocTitle" style="font-weight:700; color:var(--text-dim); font-size: 0.8rem;">ENGLISH VIEWER (SM/ECO)</span>
            <div style="width: 100px;"></div> 
        </div>
        <div class="pdf-frame-wrapper" id="pdfWrapper"></div>
    </div>

    <script>
        const config = {
            prefix: 'secoexen-', // الاعتماد على بريفكس الاقتصاد لتوحيد الملفات
            path: 'ex/', 
            years: [2026, 2025, 2024, 2023, 2022, 2021, 2020, 2019, 2018, 2017, 2016, 2015, 2014, 2013, 2012, 2011, 2010]
        };

        async function init() {
            const grid = document.getElementById('examsGrid');
            const status = document.getElementById('statusMessage');
            
            for (const year of config.years) {
                const fileUrl = `${config.path}${config.prefix}${year}.pdf`;
                try {
                    const res = await fetch(fileUrl, { method: 'HEAD' });
                    if (res.ok) createCard(year, fileUrl);
                } catch (e) { }
            }
            status.style.display = 'none';
            
            const urlYear = new URLSearchParams(window.location.search).get('exams');
            if (urlYear) openExam(urlYear, `${config.path}${config.prefix}${urlYear}.pdf`);
        }

        function createCard(year, url) {
            const card = document.createElement('div');
            card.className = 'exam-card';
            card.onclick = () => openExam(year, url);
            card.innerHTML = `<i class="fa-solid fa-language"></i><span class="year">${year}</span><span class="label">English SM</span>`;
            document.getElementById('examsGrid').appendChild(card);
        }

        function openExam(year, url) {
            window.history.pushState(null, '', `?exams=${year}`);
            document.getElementById('viewerContainer').style.display = 'flex';
            document.getElementById('navBack').style.visibility = 'hidden';
            document.body.style.overflow = 'hidden';
            document.getElementById('currentDocTitle').innerText = `English National Exam - Session ${year}`;

            const fullFileUrl = window.location.origin + '/' + url;
            const googleViewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(fullFileUrl)}&embedded=true`;

            document.getElementById('pdfWrapper').innerHTML = `<iframe src="${googleViewerUrl}"></iframe>`;
        }

        function closeViewer() {
            window.history.pushState(null, '', window.location.pathname);
            document.getElementById('viewerContainer').style.display = 'none';
            document.getElementById('navBack').style.visibility = 'visible';
            document.body.style.overflow = 'auto';
            document.getElementById('pdfWrapper').innerHTML = ''; 
        }

        window.onpopstate = () => { if (!window.location.search.includes('exams')) closeViewer(); };
        window.onload = init;
    </script>
</body>
</html>
