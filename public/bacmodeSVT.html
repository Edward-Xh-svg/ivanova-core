<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bac Mode | SVT - Simulation</title>
    <link rel="icon" href="bacmaroc-faivcon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <style>
        :root {
            --bg: #050505;
            --accent: #10b981; /* أخضر زمردي لمسلك SVT */
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        .global-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 500;
        }
        .back-home { color: #707070; text-decoration: none; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .back-home:hover { color: #fff; }
        .brand-logo { height: 40px; opacity: 0.8; }

        #app { min-height: 100vh; display: flex; flex-direction: column; }

        .grid-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .mode-header { margin-bottom: 40px; }
        .mode-header h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .subject-card { 
            background: var(--glass); border: 1px solid var(--border); padding: 40px 20px; border-radius: 24px; 
            cursor: pointer; transition: 0.3s; 
        }
        .subject-card:hover { border-color: var(--accent); transform: translateY(-5px); background: rgba(16, 185, 129, 0.05); }
        .subject-card i { font-size: 2.5rem; color: var(--accent); margin-bottom: 15px; }

        .simulation-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; }
        .sim-header { background: #0a0a0a; padding: 10px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .timer { font-family: monospace; font-size: 1.8rem; font-weight: bold; color: var(--accent); background: #111; padding: 5px 20px; border-radius: 10px; border: 1px solid var(--accent); }
        
        .pdf-container { flex-grow: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        .cheater-screen { 
            position: fixed; inset: 0; background: #991b1b; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        .reset-btn { background: #fff; color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 700; cursor: pointer; margin-top: 20px; }

        [v-cloak] { display: none; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <header class="global-header" v-if="currentView !== 'simulating' && !isCheater">
        <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</a>
        <img src="grosmen-fivcon.png" class="brand-logo" alt="Grosmen Logo">
    </header>

    <div v-if="currentView === 'subjects'" class="grid-container">
        <div class="mode-header">
            <h1>BAC MODE</h1>
            <p style="color: #707070;">بيئة المحاكاة - مسلك علوم الحياة والأرض</p>
        </div>
        <div class="subjects-grid">
            <div v-for="sub in subjects" :key="sub.id" class="subject-card" @click="selectSubject(sub)">
                <i :class="sub.icon"></i>
                <h3>{{ sub.name }}</h3>
                <p style="color: #555; font-size: 0.85rem; margin-top: 8px;">{{ sub.hours }} ساعات</p>
            </div>
        </div>
    </div>

    <div v-if="currentView === 'years'" class="grid-container">
        <button @click="currentView = 'subjects'" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-bottom:20px; font-family:'Cairo';">
            <i class="fa-solid fa-chevron-right"></i> العودة للمواد
        </button>
        <h2 style="margin-bottom: 30px;">{{ selectedSubject.name }}</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px;">
            <button v-for="year in availableYears" @click="startSimulation(year)" 
                    style="background:var(--glass); border:1px solid var(--border); color:#fff; padding:20px; border-radius:15px; cursor:pointer; font-weight:700;">
                {{ year }}
            </button>
        </div>
    </div>

    <div v-if="currentView === 'simulating'" class="simulation-view">
        <div class="sim-header">
            <span style="font-weight: 800;">{{ selectedSubject.name }} | {{ currentYear }}</span>
            <div class="timer">{{ formattedTime }}</div>
            <div style="color: var(--danger); font-size: 0.7rem;">تحذير: الخروج = غش</div>
        </div>
        <div class="pdf-container">
            <iframe :src="pdfUrl"></iframe>
        </div>
    </div>

    <div v-if="isCheater" class="cheater-screen">
        <i class="fa-solid fa-biohazard" style="font-size: 5rem; margin-bottom: 20px;"></i>
        <h1 style="font-size: 3rem; font-weight: 900;">إقصاء فوري!</h1>
        <p>لقد غادرت وضع ملء الشاشة. القوانين في SVT صارمة تماماً كالعلم.</p>
        <button class="reset-btn" @click="resetAll">محاولة جديدة</button>
    </div>
</div>

<script>
const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

createApp({
    setup() {
        const currentView = ref('subjects');
        const isCheater = ref(false);
        const selectedSubject = ref(null);
        const currentYear = ref(null);
        const timeLeft = ref(0);
        const timerInterval = ref(null);

        const subjects = [
            { id: 'svt', name: 'علوم الحياة والأرض', icon: 'fa-solid fa-dna', prefix: 'svtexsv-', hours: 3 },
            { id: 'pc', name: 'الفيزياء والكيمياء', icon: 'fa-solid fa-atom', prefix: 'svtexpc-', hours: 3 },
            { id: 'math', name: 'الرياضيات', icon: 'fa-solid fa-calculator', prefix: 'svtexma-', hours: 3 },
            { id: 'ph', name: 'الفلسفة', icon: 'fa-solid fa-brain', prefix: 'svtexph-', hours: 2 },
            { id: 'en', name: 'الإنجليزية', icon: 'fa-solid fa-language', prefix: 'secoexen-', hours: 2 }
        ];

        const availableYears = [2026, 2025, 2024, 2023, 2022, 2021, 2020];

        const selectSubject = (sub) => {
            selectedSubject.value = sub;
            currentView.value = 'years';
        };

        const startSimulation = (year) => {
            currentYear.value = year;
            timeLeft.value = selectedSubject.value.hours * 3600;
            currentView.value = 'simulating';
            
            document.documentElement.requestFullscreen().catch(() => {
                alert("يجب تفعيل ملء الشاشة للمحاكاة!");
                currentView.value = 'years';
            });

            timerInterval.value = setInterval(() => {
                if (timeLeft.value > 0) timeLeft.value--;
                else stopSimulation();
            }, 1000);
        };

        const stopSimulation = () => {
            clearInterval(timerInterval.value);
            if (document.fullscreenElement) document.exitFullscreen();
        };

        const resetAll = () => {
            isCheater.value = false;
            currentView.value = 'subjects';
            timeLeft.value = 0;
            clearInterval(timerInterval.value);
        };

        const handleFullscreenChange = () => {
            if (currentView.value === 'simulating' && !document.fullscreenElement) {
                isCheater.value = true;
                currentView.value = 'idle';
                stopSimulation();
            }
        };

        onMounted(() => {
            document.addEventListener('fullscreenchange', handleFullscreenChange);
        });

        const formattedTime = computed(() => {
            const h = Math.floor(timeLeft.value / 3600);
            const m = Math.floor((timeLeft.value % 3600) / 60);
            const s = timeLeft.value % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        });

        const pdfUrl = computed(() => {
            if (!selectedSubject.value || !currentYear.value) return '';
            const rawUrl = `${window.location.origin}/ex/${selectedSubject.value.prefix}${currentYear.value}.pdf`;
            return `https://docs.google.com/viewer?url=${encodeURIComponent(rawUrl)}&embedded=true`;
        });

        return {
            currentView, subjects, selectSubject, selectedSubject, availableYears,
            startSimulation, isCheater, currentYear, formattedTime, pdfUrl, resetAll
        };
    }
}).mount('#app');
</script>

</body>
</html>
