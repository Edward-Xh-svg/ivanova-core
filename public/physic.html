    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const gridView = document.getElementById('grid-view');
        const readerView = document.getElementById('reader-view');
        const pdfList = document.getElementById('pdf-list');
        const container = document.getElementById('pdf-render-container');
        const currentTitle = document.getElementById('current-exam-title');

        // توليد الـ 10 ملفات من 2016 إلى 2025
        for (let year = 2016; year <= 2025; year++) {
            const fileName = `Examen national de physique chimie ${year} - SPCF-sujet`;
            const fullPath = `physicPDF/${fileName}.pdf`;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <i class="fa-solid fa-atom" style="color: #ff4d4d;"></i>
                <span>${year} - الفيزياء</span>
            `;

            card.onclick = () => openReader(fullPath, fileName);
            pdfList.appendChild(card);
        }

        async function openReader(url, title) {
            gridView.style.display = 'none';
            readerView.style.display = 'block';
            currentTitle.innerText = title.replace(/-/g, ' ');
            container.innerHTML = '<div class="loading-overlay">جاري استدعاء بيانات الفيزياء من المفاعل...</div>';

            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                container.innerHTML = ''; 

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    
                    await page.render(renderContext).promise;
                    container.appendChild(canvas);
                }
            } catch (error) {
                container.innerHTML = '<div style="color:#ff4d4d; padding:20px;">خطأ: لم يتم العثور على ملف السنة المطلوبة في مجلد physicPDF.</div>';
                console.error(error);
            }
            window.scrollTo(0, 0);
        }

        function closeReader() {
            readerView.style.display = 'none';
            gridView.style.display = 'block';
            container.innerHTML = ''; 
        }
    </script>
